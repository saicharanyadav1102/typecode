<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — typeCode</title>
  <meta name="description" content="Login to your typeCode account and continue improving your typing speed.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400..800;1,400..800&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

  <div class="auth-page">
    <!-- Background decoration -->
    <div class="auth-bg-grid"></div>

    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <a href="index.html" style="text-decoration:none;color:inherit;">type<span>Code</span></a>
      </div>
      <p class="auth-subtitle">Welcome back. Sign in to continue.</p>

      <!-- Login Form -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input class="form-input" type="email" id="login-email"
                 placeholder="you@example.com" autocomplete="email" required>
          <span class="form-error">Please enter a valid email address</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="password-field">
            <input class="form-input" type="password" id="login-password"
                   placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">👁</button>
          </div>
          <span class="form-error">Password must be at least 6 characters</span>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-submit">
          Sign In
        </button>
      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
