<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — typeCode</title>
  <meta name="description" content="Create your typeCode account and start improving your typing speed and coding accuracy.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

  <div class="auth-page">
    <div style="position: absolute; top: var(--space-6); right: var(--space-6); z-index: 10;">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        <!-- Moon Icon (Dark Mode) -->
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <!-- Sun Icon (Light Mode) -->
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </div>
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <a href="index.html" style="text-decoration:none;color:inherit;">type<span>Code</span></a>
      </div>
      <p class="auth-subtitle">Create your account and start typing.</p>

      <!-- Register Form -->
      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-username">Username</label>
          <input class="form-input" type="text" id="reg-username"
                 placeholder="codingmaster" autocomplete="username" required>
          <span class="form-error">Username must be at least 3 characters</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input class="form-input" type="email" id="reg-email"
                 placeholder="name@gmail.com" autocomplete="email" required>
          <span class="form-error">Please enter a valid email address</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <div class="password-field">
            <input class="form-input" type="password" id="reg-password"
                   placeholder="6+ chars, A-Z, 0-9, symbol" autocomplete="new-password" required>
            <button type="button" class="password-toggle" aria-label="Toggle password">Show</button>
          </div>
          <span class="form-error">Password must include 6+ characters, uppercase, digit, and special character</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <div class="password-field">
            <input class="form-input" type="password" id="reg-confirm"
                   placeholder="Repeat your password" autocomplete="new-password" required>
            <button type="button" class="password-toggle" aria-label="Toggle password">Show</button>
          </div>
          <span class="form-error">Passwords do not match</span>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="reg-submit">
          Create Account
        </button>
      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
